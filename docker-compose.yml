version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_TITLE=Multi-Step Registration Form
      - REACT_APP_VERSION=1.0.0
      - REACT_APP_ENVIRONMENT=production
      - REACT_APP_ENABLE_ASYNC_VALIDATION=true
      - REACT_APP_ENABLE_DARK_MODE=false
    depends_on:
      - api
    networks:
      - app-network

  api:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./db.json:/app/db.json
    command: npx json-server --watch db.json --port 3001 --host 0.0.0.0
    ports:
      - "3001:3001"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge